<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configure Secrets — nanobot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
          max-width: 480px; width: 100%; padding: 32px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd;
                         border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
  input[type=password]:focus { outline: none; border-color: #333; }
  button { width: 100%; padding: 12px; background: #111; color: #fff; border: none;
           border-radius: 8px; font-size: 15px; cursor: pointer; }
  button:hover { background: #333; }
</style>
</head>
<body>
<div class="card">
  <h1>Configure Secrets</h1>
  <p class="subtitle">Skill: <strong>$skill_name</strong></p>
  <form method="POST" action="/secure/setup">
    <input type="hidden" name="token" value="$token">
    $fields
    <button type="submit">Save</button>
  </form>
</div>
</body>
</html>
